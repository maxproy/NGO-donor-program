<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - NGO Impact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
      <div class="logo">NGO Impact</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="Donation_form.html">Donate</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main class="contact-page">
      <section class="contact-section">
        <h1>Send Us a Message</h1>
        <p>Have a question, suggestion, or want to share feedback? Send us a message and we will respond soon.</p>

        <form id="contactForm" class="contact-form">
          <input type="text" id="contactName" placeholder="Your Name" required>
          <input type="email" id="contactEmail" placeholder="Your Email" required>
          <input type="text" id="contactSubject" placeholder="Subject" required>
          <textarea id="contactMessage" placeholder="Your Message" required></textarea>
          <button type="submit">Send Message</button>
        </form>

        <div class="contact-info">
          <div><strong>Email:</strong> contact@ngoproject.org</div>
          <div><strong>Phone:</strong> +254 718 485 112</div>
          <div><strong>Location:</strong> Nairobi, Kenya</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 NGO Impact. All rights reserved.</p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
