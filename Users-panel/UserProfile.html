<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - NGO Impact</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="UserProfile.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">NGO Impact</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="profile-wrapper">
        <div class="profile-card">
            <h1>My Profile</h1>
            
            <!-- VIEW MODE -->
            <div id="view-section">
                <div class="info-row"><strong>Full Name:</strong> <span id="view-name"></span></div>
                <div class="info-row"><strong>Email:</strong> <span id="view-email"></span></div>
                <div class="info-row"><strong>Phone:</strong> <span id="view-phone"></span></div>
                <div class="info-row"><strong>ID Number:</strong> <span id="view-idno"></span></div>
                
                <div class="action-buttons">
                    <button class="btn" id="edit-btn" style="width: 100%;">Edit Profile</button>
                    <button class="btn-danger" id="logout-btn">Logout</button>
                </div>
            </div>

            <!-- EDIT MODE (Hidden by default) -->
            <form id="edit-section" style="display: none;">
                <label><strong>Full Name:</strong></label>
                <input type="text" id="edit-name" class="edit-input" required>
                
                <label><strong>Email (Cannot be changed):</strong></label>
                <input type="email" id="edit-email" class="edit-input" readonly>
                
                <label><strong>Phone:</strong></label>
                <input type="text" id="edit-phone" class="edit-input" required>
                
                <label><strong>ID Number:</strong></label>
                <input type="text" id="edit-idno" class="edit-input" required>

                <div class="action-buttons">
                    <button type="submit" class="btn" style="width: 100%;">Save Changes</button>
                    <button type="button" class="btn-outline" id="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="UserProfile.js"></script>
</body>
</html>
