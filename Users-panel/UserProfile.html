<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - NGO Impact</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="UserProfile.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="logo">NGO Impact</div>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="nav-links">
            <span onclick="window.location.href='index.html'">Home</span>
            <span onclick="window.location.href='Donation_form.html'">Donate</span>
            <div class="admin-btn" onclick="window.location.href='../admin-panel/admin-login.html'">Admin Dashboard</div>
        </div>
    </nav>

    <div class="profile-container">
        <h1 style="color: #1f7a4c; margin-bottom: 20px;">User Profile</h1>
        <div class="profile-info">
            <p><strong>Name:</strong> <span id="profile-name">Loading...</span></p>
            <p><strong>Email:</strong> <span id="profile-email">Loading...</span></p>
            <p><strong>Phone:</strong> <span id="profile-phone">Loading...</span></p>
            <p><strong>Address:</strong> <span id="profile-address">Loading...</span></p>
        </div>
        
        <div class="profile-actions">
            <button class="btn" onclick="window.location.href='index.html'">Back to Home</button>
            <button class="btn" id="logout-btn" style="background-color: #e74c3c;">Logout</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="UserProfile.js"></script>
</body>
</html>
