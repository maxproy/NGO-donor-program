<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - NGO Project</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="UserProfile.css">
</head>
<body>

<!-- Top Navigation -->
<nav class="navbar">
    <div class="logo">NGO Impact</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="Donation_form.html">Donate</a>
    </div>
    <div class="nav-actions">
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- Profile Content -->
<div class="profile-container">
    <div class="profile-header">
        <h2>Welcome, <span id="userName">User</span>!</h2>
    </div>
    
    <h3 style="color: #2d2d2d; margin-bottom: 10px;">Your Donation History</h3>
    <table id="donationsTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Program</th>
                <th>Amount</th>
                <th>Payment Method</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="donationsBody">
            <tr><td colspan="5" style="text-align: center; padding: 20px;">Loading donations...</td></tr>
        </tbody>
    </table>
</div>
<script src="UserProfile.js"></script>
</body>
</html>
