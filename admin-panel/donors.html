<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>NGO PROJECT-IMPACT</h2>
    <ul>
      <li><a href="admin.html">Dashboard</a></li>
                <li><a href="donors.html" class="active">Donors</a></li>
                <li><a href="donations.html">Donations</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="#" onclick="adminLogout()">Logout</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- PAGE-SPECIFIC CONTENT -->
     <h1>Donor Management</h1>
     <input type="text" id="searchDonor" placeholder="Search donors...">

<!-- Add Donor Form -->
<div class="form-container">
  <h3>Add / Edit Donor</h3>
  <form id="donorForm">
    <input type="hidden" id="donorId">

    <input type="text" id="donorName" placeholder="Full Name" required>
    <input type="email" id="donorEmail" placeholder="Email" required>
    <input type="text" id="donorPhone" placeholder="Phone Number" required>
<div class="form-group">
    <label for="donorCountry">Country</label>
    <input type="text" id="donorCountry" name="country" placeholder="e.g. Kenya">
</div>
<div class="form-group">
    <label for="donorCity">City</label>
    <input type="text" id="donorCity" name="city" placeholder="e.g. Nairobi">
</div>
    <button type="submit">Save Donor</button>
  </form>
</div>

<!-- Donor Table -->
<div class="table-section">
  <h3>All Donors</h3>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Country</th>
        <th>City</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="donorTable"></tbody>
  </table>
</div>
  </main>

</div>
<script src="donor.js"></script>
</body>
</html>
