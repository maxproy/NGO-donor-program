<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Programs - NGO Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="programs.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>NGO PROJECT-IMPACT</h2>
            <ul>
                <li><a href="admin.html">Dashboard</a></li>
                <li><a href="donors.html">Donors</a></li>
                <li><a href="donations.html">Donations</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="admin-programs.html" class="active">Programs</a></li>
                <li><a href="#" onclick="adminLogout()">Logout</a></li>
            </ul>
        </aside>

        <div class="main-content">
            <h2>Manage Programs & Donation Goals</h2>

            <!-- Form to Create a New Program -->
            <div class="form-container" style="margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>Launch New Program</h3>
                <form id="programForm">
                    <input type="hidden" id="programId">
                    <div class="form-group">
                        <label>Program Name</label>
                        <input type="text" id="programName" required placeholder="e.g. Clean Water Initiative">
                    </div>
                    <div class="form-group">
                        <label>Target Goal Amount ($)</label>
                        <input type="number" id="targetAmount" required placeholder="50000" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Target Country</label>
                        <input type="text" id="programCountry" placeholder="e.g. Uganda">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="programDesc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="programStatus" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                            <option value="active">Active</option>
                            <option value="completed">Completed</option>
                            <option value="paused">Paused</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Save Program</button>
                </form>
            </div>

            <!-- Table to View Programs and Goals -->
            <table class="styled-table" style="width: 100%; text-align: left;">
                <thead>
                    <tr>
                        <th>Program Name</th>
                        <th>Target Goal</th>
                        <th>Current Amount Raised</th>
                        <th>Remaining to Goal</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="programTable">
                    <tr><td colspan="6" style="text-align: center;">Loading programs...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Include your session check script and our new programs script -->
    <script src="admin-auth.js"></script>
    <script src="programs.js"></script>
</body>
</html>
