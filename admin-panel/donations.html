<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>NGO PROJECT-IMPACT</h2>
    <ul>
      <li><a href="admin.html">Dashboard</a></li>
                <li><a href="donors.html">Donors</a></li>
                <li><a href="donations.html" class="active">Donations</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="#" onclick="adminLogout()">Logout</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <h1>Donations</h1>

    <div class="top-actions">
      <input type="text" id="searchDonation" placeholder="Search donations...">
      <button onclick="openDonationModal()">+ Add Donation</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Donor</th>
            <th>Program</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="donationTable"></tbody>
      </table>
    </div>

        <div id="donationModal" class="modal">
      <div class="modal-content">
        <h2>Add Donation</h2>

        <input type="hidden" id="donationId">

        <select id="donorSelect"></select>
        <select id="programSelect"><option value="">Select Program</option></select>
        <input type="number" id="amount" placeholder="Amount">
        
        <div class="modal-actions">
          <button onclick="saveDonation()">Save</button>
          <button onclick="closeDonationModal()" class="cancel">Cancel</button>
        </div>
      </div>
    </div>

  </main>

</div>
<script src="donations.js"></script>
</body>
</html>
