<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
 <script src="admin-auth.js"></script>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>NGO PROJECT-IMPACT</h2>
    <ul>
        <li><a href="admin.html" class="active">Dashboard</a></li>
        <li><a href="donors.html">Donors</a></li>
        <li><a href="donations.html">Donations</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="#" onclick="adminLogout()">Logout</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main">


    <!-- Cards -->
    <section class="hero">
            <div class="cards">
                <div class="card">
                <h3>Total Donations</h3>
                <p id="totalDonations">$0</p>
                </div>

                <div class="card">
                <h3>Total Donors</h3>
                <p id="totalDonors">0</p>
                </div>

                <div class="card">
                <h3>This Month</h3>
                <p id="monthlyDonations">$0</p>
                </div>
            </div>
    </section>

    <!-- Table -->
    <section class="table-section">
      <h2>Recent Donations</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="donationTable"></tbody>
      </table>
    </section>

    <!-- Active Programs -->
    <section class="table-section" style="margin-top: 30px;">
      <h2>Active Programs Tracker</h2>
      <table>
        <thead>
          <tr>
            <th>Program</th>
            <th>Target Goal</th>
            <th>Amount Raised</th>
            <th>Progress</th>
          </tr>
        </thead>
        <tbody id="dashboardProgramTable"></tbody>
      </table>
    </section>

  </main>
</div>
<script src="script.js"></script>
</body>
</html>
